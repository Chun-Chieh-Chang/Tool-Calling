<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tool-Calling | AI Agent 工具檢索庫</title>
  <meta name="description" content="全自動工具調用效能外掛系統 - 擁有 200+ 頂尖開源 AI 代理技能與工具的檢索庫">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="background-effects">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
  </div>

  <main class="container">
    <header class="header">
      <div class="logo-area">
        <h1>Tool-Calling <span>🔧⚡</span></h1>
        <p class="subtitle">全自動工具調用效能外掛系統</p>
      </div>
      <div class="search-container glass-panel">
        <input type="text" id="searchInput" placeholder="描述你的需求，例如：「我想做簡報」或「security scan」..." autocomplete="off">
        <select id="categorySelect">
          <option value="">所有分類</option>
        </select>
      </div>
    </header>

    <div class="stats-bar">
      <span id="resultCount">載入中...</span>
    </div>

    <div id="resultsGrid" class="grid">
      <!-- 搜尋結果將由 JS 動態渲染在這裡 -->
    </div>
  </main>

  <template id="toolCardTemplate">
    <article class="tool-card glass-panel">
      <div class="card-header">
        <h2 class="tool-name"></h2>
        <span class="match-badge"></span>
      </div>
      <p class="tool-desc"></p>
      <div class="tags-container">
        <!-- 標籤動態插入 -->
      </div>
      <div class="card-footer">
        <span class="category-tag"></span>
        <a class="github-link" href="#" target="_blank" rel="noopener noreferrer">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
          View Source
        </a>
      </div>
      <div class="progress-bar-container">
        <div class="progress-bar"></div>
      </div>
    </article>
  </template>

  <script type="module" src="app.js"></script>
</body>
</html>
